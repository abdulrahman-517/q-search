<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="720" viewBox="0 0 1600 720" role="img" aria-labelledby="title desc">
  <title id="title">Q-Search — Quality-first YouTube search</title>
  <desc id="desc">A product banner for Q-Search, an Arabic-first YouTube search engine that ranks results using a quality score.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#050505"/>
      <stop offset="1" stop-color="#171717"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="20%" cy="20%" r="55%">
      <stop offset="0" stop-color="#E03030" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#E03030" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="greenGlow" cx="82%" cy="72%" r="52%">
      <stop offset="0" stop-color="#30C080" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#30C080" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="720" rx="36" fill="url(#bg)"/>
  <rect width="1600" height="720" rx="36" fill="url(#redGlow)"/>
  <rect width="1600" height="720" rx="36" fill="url(#greenGlow)"/>

  <g transform="translate(1150 110)" opacity="0.95">
    <circle cx="150" cy="150" r="145" fill="#FFFFFF" fill-opacity="0.04" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
    <circle cx="150" cy="150" r="92" fill="none" stroke="#FFFFFF" stroke-width="18"/>
    <line x1="216" y1="216" x2="292" y2="292" stroke="#30C080" stroke-width="24" stroke-linecap="round"/>
    <path d="M88 150l40 40 88-98" fill="none" stroke="#E03030" stroke-width="18" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <text x="120" y="270" font-family="Arial, Helvetica, sans-serif" font-size="108" font-weight="800" fill="#FFFFFF">
    <tspan fill="#E03030">Q</tspan><tspan>-Search</tspan>
  </text>
  <text x="128" y="350" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="600" fill="#EAEAEA">Quality-first YouTube search</text>
  <text x="128" y="412" font-family="Arial, Helvetica, sans-serif" font-size="27" fill="#AFAFAF">Rank videos and playlists by relevance, engagement and content signals — not views alone.</text>

  <g transform="translate(128 485)">
    <rect width="220" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="110" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Arabic-first</text>

    <rect x="240" width="220" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="350" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">FastAPI</text>

    <rect x="480" width="220" height="58" rx="29" fill="#FFFFFF" fill-opacity="0.08" stroke="#FFFFFF" stroke-opacity="0.14"/>
    <text x="590" y="38" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">YouTube API</text>
  </g>
</svg>
